services:
  - type: web
    name: agentdao-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: backend
    envVars:
      - key: PORT
        value: 3001
      - key: MONAD_RPC_URL
        value: https://testnet-rpc.monad.xyz/
      - key: PRIVATE_KEY
        sync: false # User will fill this in Render Dashboard
